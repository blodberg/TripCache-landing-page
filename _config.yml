# Feature List                            Edit, add or remove features to be presented.
features                                  :

  - title                                 : Simple Budget Tracking
    description                           : Quickly log your expenses and keep your travel budget on track with ease.
    fontawesome_icon_name                 : wallet
    
  - title                                 : Trip Insights
    description                           : Compare spending and key stats across your past trips for better travel planning.
    fontawesome_icon_name                 : chart-pie

  - title                                 : Currency Conversion
    description                           : Enter expenses in any currency — they’ll automatically convert to your home currency.
    fontawesome_icon_name                 : dollar-sign

  - title                                 : iCloud Sync
    description                           : Sync trip data across all your devices
    fontawesome_icon_name                 : sync

  - title                                 : Location Support
    description                           : Add locations to your expenses to see exactly where your money goes on each trip.
    fontawesome_icon_name                 : map
  
  - title                                 : Privacy Focused
    description                           : Your data stays secure on your device and in your iCloud — never shared with third parties.
    fontawesome_icon_name                 : lock

